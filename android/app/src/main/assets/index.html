<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%23D9EEF3'/%3E%3Cpath fill='%23176B87' d='M14 13h22c2.2 0 4 1.8 4 4v14c0 2.2-1.8 4-4 4H26l-7 5v-5h-5c-2.2 0-4-1.8-4-4V17c0-2.2 1.8-4 4-4z'/%3E%3Cpath fill='white' fill-opacity='.96' d='M17 20h18v3H17z'/%3E%3Cpath fill='white' fill-opacity='.78' d='M17 26h13v3H17z'/%3E%3Ccircle cx='35' cy='34' r='4' fill='%2362BFD6'/%3E%3C/svg%3E">
  <title>短信接收助手</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #eef5f4;
      --surface: rgba(255, 255, 255, .68);
      --surface-strong: rgba(255, 255, 255, .88);
      --text: #1e2c30;
      --muted: #65767b;
      --line: rgba(255, 255, 255, .7);
      --accent: #176b87;
      --accent-2: #62bfd6;
      --accent-soft: #d9eef3;
      --warn: #d58c22;
      --bad: #bd3434;
      --ok: #1c9a65;
      --shadow: 0 18px 44px rgba(31, 55, 62, .14);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #152024;
        --surface: rgba(35, 44, 49, .68);
        --surface-strong: rgba(39, 48, 53, .92);
        --text: #eef5f5;
        --muted: #a8b7ba;
        --line: rgba(255, 255, 255, .12);
        --accent: #62bfd6;
        --accent-2: #8ad8e6;
        --accent-soft: rgba(98, 191, 214, .18);
        --shadow: 0 18px 44px rgba(0, 0, 0, .28);
      }
      body {
        background:
          linear-gradient(135deg, rgba(98,191,214,.16), rgba(255,255,255,0) 38%),
          linear-gradient(155deg, #121c20, var(--bg) 48%, #1f2422);
      }
      .top { background: rgba(22, 31, 35, .72); }
    }
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(98,191,214,.18), rgba(255,255,255,0) 38%),
        linear-gradient(155deg, #f7fbfb, var(--bg) 46%, #f3efe4);
    }
    button, input, select, textarea { font: inherit; }
    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
      backdrop-filter: blur(16px);
    }
    button.primary { border-color: transparent; background: var(--accent); color: #fff; }
    button.ghost { background: rgba(255,255,255,.36); }
    button:disabled { opacity: .48; cursor: not-allowed; }
    input, select, textarea {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-strong);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }
    input[type="date"] { -webkit-appearance: none; appearance: none; }
    textarea { min-height: 120px; padding: 10px 12px; resize: vertical; }
    .shell { position: relative; width: 100%; max-width: 1040px; margin: 0 auto; padding: 18px; overflow-x: hidden; }
    .top {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: -18px -18px 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.46);
      backdrop-filter: blur(22px);
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brandIcon { width: 40px; height: 40px; flex: 0 0 40px; border-radius: 12px; box-shadow: 0 10px 24px rgba(23,107,135,.18); }
    h1 { margin: 0; font-size: 23px; letter-spacing: 0; }
    .sub { margin-top: 2px; color: var(--muted); font-size: 13px; }
    .actions { display: flex; gap: 8px; flex-shrink: 0; }
    .status {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      padding: 15px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 0 4px rgba(213,140,34,.14); }
    .ok .dot { background: var(--ok); box-shadow: 0 0 0 4px rgba(28,154,101,.14); }
    .statusMeta { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-top: 11px; }
    .statusItem {
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.28);
    }
    .statusItem b { display: block; margin-bottom: 2px; color: var(--muted); font-size: 11px; font-weight: 700; }
    .statusItem span { display: block; overflow: hidden; color: var(--text); font-size: 13px; font-weight: 800; white-space: nowrap; text-overflow: ellipsis; }
    .alertLine { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
    .pill, .tag, .copyCode {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.42);
      color: var(--text);
    }
    .pill.warn { background: rgba(213,140,34,.16); color: #9b6417; }
    .pill.bad { background: rgba(189,52,52,.14); color: var(--bad); }
    .pill.ok { background: rgba(28,154,101,.14); color: var(--ok); }
    .dashboard { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px; }
    .metric, .tools, .quick, .message {
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .metric { min-height: 108px; padding: 13px 14px; }
    .metric h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); }
    .metric strong { display: block; font-size: 24px; line-height: 1.1; }
    .metric small { display: block; margin-top: 5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar { height: 8px; margin-top: 10px; border-radius: 999px; background: rgba(111,126,130,.18); overflow: hidden; }
    .fill { height: 100%; width: 0; border-radius: inherit; background: var(--accent); }
    .fill.warn { background: var(--warn); }
    .fill.bad { background: var(--bad); }
    .facts { grid-column: span 4; min-height: 0; }
    .compactFacts { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.36);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip b { margin-right: 4px; color: var(--muted); font-weight: 600; }
    .tools { padding: 12px; margin-bottom: 12px; }
    .toolGrid { display: grid; grid-template-columns: minmax(180px, 1.4fr) repeat(2, minmax(130px, .7fr)); gap: 8px; }
    .toolGrid > *, .logGrid > * { min-width: 0; }
    .filterPanel { display: grid; gap: 10px; margin-top: 10px; }
    .filterRow { display: grid; grid-template-columns: 72px 1fr; gap: 8px; align-items: center; }
    .filterRow > b { color: var(--muted); font-size: 12px; }
    .segmented { display: flex; flex-wrap: wrap; gap: 6px; }
    .segmented label {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.36);
      color: var(--text);
      cursor: pointer;
      user-select: none;
      overflow: hidden;
    }
    .segmented input { position: absolute; opacity: 0; pointer-events: none; }
    .segmented span { display: inline-flex; align-items: center; min-height: 30px; padding: 0 11px; }
    .segmented input:checked + span { background: var(--accent); color: #fff; }
    .dateQuick { display: flex; flex-wrap: wrap; gap: 6px; }
    .toolActions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .check { display: inline-flex; align-items: center; gap: 7px; min-height: 38px; padding: 0 10px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.4); }
    .check input { width: auto; min-height: auto; }
    .quick { display: none; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; padding: 14px 16px; }
    .quick.show { display: flex; }
    .codeValue { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
    .list { display: grid; gap: 12px; }
    .message { padding: 15px 16px; }
    .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; margin-bottom: 10px; color: var(--muted); font-size: 13px; }
    .sender { color: var(--text); font-weight: 800; }
    .body { white-space: pre-wrap; word-break: break-word; font-size: 16px; }
    .messageActions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .messageActions button { min-height: 32px; padding: 0 10px; font-size: 13px; }
    .tag { border-color: transparent; background: var(--accent-soft); color: var(--accent); }
    .tag.fail { background: rgba(189,52,52,.14); color: var(--bad); }
    .tag.wait { background: rgba(213,140,34,.16); color: #9b6417; }
    .copyCode { margin-left: 4px; border-color: transparent; background: var(--accent); color: #fff; }
    .empty { padding: 34px; text-align: center; color: var(--muted); }
    .pager { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 16px 0 2px; color: var(--muted); font-size: 13px; }
    .modal { position: fixed; inset: 0; z-index: 5; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(20,30,34,.34); backdrop-filter: blur(14px); }
    .modal.open { display: flex; }
    .panel { width: min(440px, 100%); border: 1px solid var(--line); border-radius: 20px; background: var(--surface-strong); box-shadow: var(--shadow); padding: 18px; backdrop-filter: blur(24px); }
    .panel h2 { margin: 0 0 6px; font-size: 19px; }
    .panel p { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    .field { margin-top: 10px; }
    .field label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 13px; }
    .phoneRow { display: grid; grid-template-columns: 112px 1fr; gap: 8px; }
    .panel-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .view.hidden { display: none; }
    .logHead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .logHead h2 { margin: 0; font-size: 23px; }
    .logHead p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .logStats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .logStat, .logTools, .logRow {
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .logStat { padding: 12px; min-height: 76px; }
    .logStat b { display: block; color: var(--muted); font-size: 12px; }
    .logStat strong { display: block; margin-top: 4px; font-size: 22px; line-height: 1.1; }
    .logTools { padding: 12px; margin-bottom: 12px; }
    .logGrid { display: grid; grid-template-columns: minmax(180px, 1.4fr) repeat(2, minmax(130px, .7fr)); gap: 8px; }
    .logActions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .logList { display: grid; gap: 10px; }
    .logRow { display: grid; grid-template-columns: 154px 96px 1fr; gap: 10px; align-items: flex-start; padding: 12px; }
    .logTime { color: var(--muted); font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: nowrap; }
    .logType { justify-self: start; min-height: 24px; padding: 3px 8px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 800; }
    .logType.warn { background: rgba(213,140,34,.16); color: #9b6417; }
    .logType.bad { background: rgba(189,52,52,.14); color: var(--bad); }
    .logDetail { word-break: break-word; white-space: pre-wrap; }
    .toast { position: fixed; left: 50%; bottom: 18px; z-index: 9; transform: translateX(-50%); display: none; max-width: min(420px, calc(100vw - 28px)); padding: 10px 14px; border-radius: 999px; background: rgba(30,44,48,.9); color: #fff; box-shadow: var(--shadow); }
    .toast.show { display: block; }
    @media (max-width: 840px) {
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .facts { grid-column: span 2; }
      .toolGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolGrid .search { grid-column: span 2; }
      .filterRow { grid-template-columns: 1fr; }
      .logStats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .logGrid { grid-template-columns: 1fr; }
      .logRow { grid-template-columns: 1fr; gap: 6px; }
    }
    @media (max-width: 640px) {
      .shell { padding: 12px; }
      .top {
        flex-direction: column;
        margin: -12px -12px 12px;
        padding: 12px;
        width: auto;
        max-width: none;
        align-items: stretch;
        gap: 10px;
        background: rgba(26, 42, 48, .92);
        border-bottom-color: rgba(255,255,255,.16);
        box-shadow: 0 12px 30px rgba(0,0,0,.18);
      }
      .brand { width: 100%; gap: 8px; }
      .brand > div { min-width: 0; }
      .brandIcon { width: 34px; height: 34px; flex-basis: 34px; border-radius: 9px; }
      h1 { font-size: 20px; color: #f4fbfb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .top .sub { color: rgba(244,251,251,.76); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .actions { width: 100%; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
      .actions button { min-height: 34px; padding: 0 6px; background: rgba(255,255,255,.14); color: #f4fbfb; border-color: rgba(255,255,255,.16); }
      .actions button.primary { background: var(--accent-2); color: #0d2b33; border-color: transparent; font-weight: 800; }
      .status { padding: 12px 13px; border-radius: 15px; }
      .statusMeta { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
      .statusItem { padding: 7px 8px; }
      .statusItem span { font-size: 12px; }
      .dashboard { gap: 8px; margin-bottom: 10px; }
      .metric { min-height: 78px; padding: 10px 11px; border-radius: 14px; }
      .metric h3 { margin-bottom: 5px; font-size: 12px; }
      .metric strong { font-size: 20px; }
      .metric small { margin-top: 3px; font-size: 12px; }
      .bar { height: 6px; margin-top: 8px; }
      .facts { padding: 9px 10px; }
      .chip { min-height: 24px; font-size: 11px; }
      .tools, .quick, .message { border-radius: 14px; }
      .toolGrid { grid-template-columns: 1fr; }
      .toolGrid .search { grid-column: auto; }
      input[type="date"] { font-size: 13px; padding: 0 10px; }
      .segmented label { min-height: 30px; font-size: 12px; }
      .segmented span { min-height: 28px; padding: 0 9px; }
      .quick { align-items: flex-start; flex-direction: column; }
      .phoneRow { grid-template-columns: 1fr; }
      .logHead { flex-direction: column; }
      .logStats { gap: 8px; }
      .logStat { min-height: 64px; padding: 10px; border-radius: 14px; }
      .logStat strong { font-size: 19px; }
      .logRow, .logTools { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">
        <svg class="brandIcon" viewBox="0 0 48 48" aria-hidden="true"><rect width="48" height="48" rx="10" fill="#D9EEF3"/><path fill="#176B87" d="M14 13h22c2.2 0 4 1.8 4 4v14c0 2.2-1.8 4-4 4H26l-7 5v-5h-5c-2.2 0-4-1.8-4-4V17c0-2.2 1.8-4 4-4z"/><path fill="#fff" fill-opacity=".96" d="M17 20h18v3H17z"/><path fill="#fff" fill-opacity=".78" d="M17 26h13v3H17z"/><circle cx="35" cy="34" r="4" fill="#62BFD6"/></svg>
        <div><h1>短信接收助手</h1><div class="sub">远程收发短信，掌握手机状态</div></div>
      </div>
      <div class="actions"><button id="sendOpen">发短信</button><button id="logsOpen">日志</button><button id="settings">设置</button><button class="primary" id="refresh">刷新</button></div>
    </header>

    <main class="view" id="mainView">
    <section class="status" id="statusBox">
      <div>
        <strong id="status">未连接</strong>
        <div class="sub" id="hint">读取短信前需要访问密码</div>
        <div class="statusMeta">
          <div class="statusItem"><b>当前时间</b><span id="nowText">--</span></div>
          <div class="statusItem"><b>页面更新</b><span id="pageUpdateText">未更新</span></div>
          <div class="statusItem"><b>手机采样</b><span id="deviceUpdateText">未读取</span></div>
          <div class="statusItem"><b>最新短信</b><span id="latestMessageText">未读取</span></div>
        </div>
        <div class="alertLine" id="alerts"></div>
      </div>
      <span class="dot"></span>
    </section>
    <section class="dashboard" id="deviceBoard"></section>
    <section class="tools">
      <div class="toolGrid">
        <input class="search" id="search" type="search" placeholder="搜索号码、备注、正文、发送状态">
        <input id="smsStartDate" type="date" aria-label="开始日期">
        <input id="smsEndDate" type="date" aria-label="结束日期">
      </div>
      <div class="filterPanel">
        <div class="filterRow"><b>类型</b><div class="segmented" id="directionFilter">
          <label><input type="radio" name="directionFilter" value="all" checked><span>全部短信</span></label>
          <label><input type="radio" name="directionFilter" value="incoming"><span>收到</span></label>
          <label><input type="radio" name="directionFilter" value="outgoing"><span>发出</span></label>
        </div></div>
        <div class="filterRow"><b>SIM</b><div class="segmented" id="simFilter"></div></div>
        <div class="filterRow"><b>内容</b><div class="segmented" id="codeFilter">
          <label><input type="radio" name="codeFilter" value="all" checked><span>全部内容</span></label>
          <label><input type="radio" name="codeFilter" value="code"><span>验证码</span></label>
        </div></div>
        <div class="filterRow"><b>日期</b><div class="dateQuick">
          <button class="ghost" data-sms-range="today">今天</button>
          <button class="ghost" data-sms-range="7">近 7 天</button>
          <button class="ghost" data-sms-range="30">近 30 天</button>
          <button class="ghost" data-sms-range="all">全部</button>
        </div></div>
      </div>
      <div class="toolActions">
        <button class="ghost" id="exportCsv">导出 CSV</button>
        <button class="ghost" id="exportJson">导出 JSON</button>
        <button class="ghost" id="clearFilters">清空筛选</button>
      </div>
    </section>
    <section class="quick" id="quickCode"></section>
    <section class="list" id="messages"></section>
    <div class="pager"><button id="prevPage">上一页</button><span id="pageInfo">第 1 页</span><button id="nextPage">下一页</button></div>
    </main>

    <section class="view hidden" id="logsView">
      <div class="logHead">
        <div><h2>运行日志</h2><p id="logSummary">查看服务、frp、发送桥和短信接收状态</p></div>
        <button id="logsBack">返回短信</button>
      </div>
      <div class="logStats">
        <div class="logStat"><b>日志总数</b><strong id="logTotal">0</strong></div>
        <div class="logStat"><b>异常/失败</b><strong id="logIssues">0</strong></div>
        <div class="logStat"><b>frp 相关</b><strong id="logFrp">0</strong></div>
        <div class="logStat"><b>最近更新</b><strong id="logUpdated">未读取</strong></div>
      </div>
      <section class="logTools">
        <div class="logGrid">
          <input id="logSearch" type="search" placeholder="搜索日志内容、时间、类型">
          <input id="logStartDate" type="date" aria-label="日志开始日期">
          <input id="logEndDate" type="date" aria-label="日志结束日期">
        </div>
        <div class="filterPanel">
          <div class="filterRow"><b>类型</b><div class="segmented" id="logTypeFilter"></div></div>
          <div class="filterRow"><b>状态</b><div class="segmented" id="logIssueFilter">
            <label><input type="radio" name="logIssueFilter" value="all" checked><span>全部日志</span></label>
            <label><input type="radio" name="logIssueFilter" value="issue"><span>异常/失败</span></label>
            <label><input type="radio" name="logIssueFilter" value="normal"><span>正常日志</span></label>
          </div></div>
          <div class="filterRow"><b>日期</b><div class="dateQuick">
            <button class="ghost" data-log-range="today">今天</button>
            <button class="ghost" data-log-range="7">近 7 天</button>
            <button class="ghost" data-log-range="30">近 30 天</button>
            <button class="ghost" data-log-range="all">全部</button>
          </div></div>
        </div>
        <div class="logActions">
          <button class="primary" id="logsRefresh">刷新日志</button>
          <button class="ghost" id="logsCopy">复制当前结果</button>
          <button class="ghost" id="logsCopyRaw">复制原始日志</button>
          <button class="ghost" id="logsClearFilters">清空筛选</button>
        </div>
      </section>
      <section class="logList" id="logsList"></section>
    </section>
  </div>

  <div class="modal" id="modal"><div class="panel">
    <h2>访问设置</h2><p>填写网页访问密码，也可以在这里修改手机端密码。</p>
    <input id="token" type="password" placeholder="访问密码">
    <input id="newToken" type="password" placeholder="新的手机端访问密码" style="margin-top:10px">
    <div class="panel-actions"><button id="close">取消</button><button id="save">保存并读取</button><button class="primary" id="updateToken">更新密码</button></div>
  </div></div>

  <div class="modal" id="sendModal"><div class="panel">
    <h2>发送短信</h2><p>选择要使用的 SIM 卡，填写号码和短信内容。</p>
    <div class="field"><label>发送 SIM</label><select id="simSelect"></select></div>
    <div class="field"><label>收件号码</label><div class="phoneRow"><select id="countryCode"><option value="+86">+86 中国</option><option value="+1">+1 美国/加拿大</option><option value="+852">+852 香港</option><option value="+853">+853 澳门</option><option value="+886">+886 台湾</option><option value="+81">+81 日本</option><option value="+82">+82 韩国</option><option value="+65">+65 新加坡</option><option value="+44">+44 英国</option></select><input id="localNumber" inputmode="tel" placeholder="手机号码，不用输入区号"></div></div>
    <div class="field"><label>短信内容</label><textarea id="smsBody" placeholder="输入要发送的短信内容"></textarea></div>
    <div class="panel-actions"><button id="sendClose">取消</button><button class="primary" id="sendSms">发送</button></div>
  </div></div>

  <div class="modal" id="remarkModal"><div class="panel">
    <h2>号码备注</h2><p id="remarkTarget">为常见号码设置一个好认的名字。</p>
    <input id="remarkName" placeholder="例如 银行卡、工作号、运营商">
    <div class="panel-actions"><button id="remarkCancel">取消</button><button class="primary" id="remarkSave">保存备注</button></div>
  </div></div>

  <div class="toast" id="toast"></div>

  <script>
    const els = {
      token: document.querySelector("#token"), newToken: document.querySelector("#newToken"),
      status: document.querySelector("#status"), hint: document.querySelector("#hint"), statusBox: document.querySelector("#statusBox"),
      alerts: document.querySelector("#alerts"), list: document.querySelector("#messages"), board: document.querySelector("#deviceBoard"),
      mainView: document.querySelector("#mainView"), logsView: document.querySelector("#logsView"),
      modal: document.querySelector("#modal"), sendModal: document.querySelector("#sendModal"), remarkModal: document.querySelector("#remarkModal"),
      simSelect: document.querySelector("#simSelect"), simFilter: document.querySelector("#simFilter"), countryCode: document.querySelector("#countryCode"), localNumber: document.querySelector("#localNumber"),
      smsBody: document.querySelector("#smsBody"), pageInfo: document.querySelector("#pageInfo"), prev: document.querySelector("#prevPage"),
      next: document.querySelector("#nextPage"), search: document.querySelector("#search"), direction: document.querySelector("#directionFilter"),
      codeFilter: document.querySelector("#codeFilter"), smsStartDate: document.querySelector("#smsStartDate"), smsEndDate: document.querySelector("#smsEndDate"),
      quick: document.querySelector("#quickCode"), toast: document.querySelector("#toast"),
      remarkTarget: document.querySelector("#remarkTarget"), remarkName: document.querySelector("#remarkName"),
      logsList: document.querySelector("#logsList"), logSearch: document.querySelector("#logSearch"), logTypeFilter: document.querySelector("#logTypeFilter"),
      logIssueFilter: document.querySelector("#logIssueFilter"), logStartDate: document.querySelector("#logStartDate"), logEndDate: document.querySelector("#logEndDate"), logSummary: document.querySelector("#logSummary"),
      logTotal: document.querySelector("#logTotal"), logIssues: document.querySelector("#logIssues"), logFrp: document.querySelector("#logFrp"), logUpdated: document.querySelector("#logUpdated"),
      nowText: document.querySelector("#nowText"), pageUpdateText: document.querySelector("#pageUpdateText"),
      deviceUpdateText: document.querySelector("#deviceUpdateText"), latestMessageText: document.querySelector("#latestMessageText")
    };
    const state = { messages: [], sims: [], logs: [], rawLogs: "", logTypes: [], offset: 0, total: 0, pageSize: 10, remarkNumber: "", lastPageUpdateAt: 0, lastDeviceSampleAt: 0 };
    const urlToken = new URLSearchParams(location.search).get("token");
    if (urlToken) localStorage.setItem("smsToken", urlToken);
    els.token.value = localStorage.getItem("smsToken") || "";

    function headers() { return els.token.value ? { Authorization: "Bearer " + els.token.value } : {}; }
    function esc(v) { return String(v == null ? "" : v).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function toast(text) { els.toast.textContent = text; els.toast.classList.add("show"); clearTimeout(toast.timer); toast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800); }
    function openModal(m) { m.classList.add("open"); }
    function closeModal(m) { m.classList.remove("open"); }
    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    async function apiFetch(url, options = {}, retries = 2) {
      let lastError;
      const method = String(options.method || "GET").toUpperCase();
      const canRetry = method === "GET";
      const attempts = canRetry ? retries + 1 : 1;
      for (let i = 0; i < attempts; i++) {
        try {
          const r = await fetch(url, options);
          if (r.ok || !canRetry || ![408,429,500,502,503,504].includes(r.status) || i === attempts - 1) return r;
          lastError = new Error("HTTP " + r.status);
        } catch (e) {
          lastError = e;
          if (!canRetry || i === attempts - 1) throw e;
        }
        els.status.textContent = "连接重试中";
        els.hint.textContent = "网络或 frp 可能抖动，正在第 " + (i + 2) + " 次重试";
        els.statusBox.classList.remove("ok");
        await sleep(600 * (i + 1));
      }
      throw lastError;
    }
    function remarks() { try { return JSON.parse(localStorage.getItem("smsRemarks") || "{}"); } catch (_) { return {}; } }
    function setRemark(number, name) { const r = remarks(); if (name) r[number] = name; else delete r[number]; localStorage.setItem("smsRemarks", JSON.stringify(r)); }
    function displayName(number) { const r = remarks(); return r[number] ? r[number] + " · " + number : number; }
    function cleanNumber(v) { return String(v || "").trim().replace(/[\s() -]/g, ""); }
    function splitPhone(value) {
      const n = cleanNumber(value);
      const codes = ["+886","+853","+852","+86","+82","+81","+65","+44","+1"];
      for (const code of codes) {
        if (n.startsWith(code)) return { countryCode: code, localNumber: n.slice(code.length) };
      }
      if (n.startsWith("00")) return splitPhone("+" + n.slice(2));
      return { countryCode: "+86", localNumber: n };
    }
    function composedRecipient() {
      const local = cleanNumber(els.localNumber.value);
      if (!local) return "";
      if (local.startsWith("+")) return local;
      if (local.startsWith("00")) return "+" + local.slice(2);
      const countryDigits = els.countryCode.value.replace("+", "");
      let normalized = local.replace(/^0+/, "");
      if (normalized.startsWith(countryDigits) && normalized.length > countryDigits.length + 4) {
        normalized = normalized.slice(countryDigits.length);
      }
      return els.countryCode.value + normalized;
    }
    function bytes(v) { if (!v) return "0 B"; const u = ["B","KB","MB","GB","TB"]; let n = Number(v), i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return (i ? n.toFixed(1) : Math.round(n)) + " " + u[i]; }
    function uptime(ms) { let s = Math.floor(Number(ms || 0) / 1000), d = Math.floor(s / 86400); s %= 86400; let h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return (d ? d + "天 " : "") + h + "时" + m + "分"; }
    function timeText(value) { const n = Number(value || 0); return n > 0 ? new Date(n).toLocaleString() : "未读取"; }
    function shortTime(value) { const n = Number(value || 0); return n > 0 ? new Date(n).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "未更新"; }
    function selectedRadio(name, fallback) { const checked = document.querySelector('input[name="' + name + '"]:checked'); return checked ? checked.value : fallback; }
    function dateStart(value) { if (!value) return 0; const d = new Date(value + "T00:00:00"); return Number.isNaN(d.getTime()) ? 0 : d.getTime(); }
    function dateEnd(value) { if (!value) return 0; const d = new Date(value + "T23:59:59.999"); return Number.isNaN(d.getTime()) ? 0 : d.getTime(); }
    function dateKey(value) {
      const n = Number(value || 0);
      if (!n) return "";
      const d = new Date(n);
      const m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
      return d.getFullYear() + "-" + m + "-" + day;
    }
    function setDateRange(startInput, endInput, range) {
      if (range === "all") { startInput.value = ""; endInput.value = ""; return; }
      const end = new Date();
      const start = new Date();
      if (range === "today") {
        start.setHours(0, 0, 0, 0);
      } else {
        start.setDate(start.getDate() - Math.max(Number(range) - 1, 0));
        start.setHours(0, 0, 0, 0);
      }
      startInput.value = dateKey(start.getTime());
      endInput.value = dateKey(end.getTime());
    }
    function fillClass(p, mode) { if (mode === "battery") return p <= 20 ? "bad" : (p <= 40 ? "warn" : ""); return p >= 90 ? "bad" : (p >= 75 ? "warn" : ""); }
    function codeOf(m) {
      if (m.code) return m.code;
      const body = String(m.body || "");
      const keyword = body.match(/(?:验证码|校验码|动态码|一次性|code|otp|verification)[^\d]{0,16}(\d{4,8})/i);
      if (keyword) return keyword[1];
      return "";
    }
    function statusTag(m) { if (m.direction !== "outgoing") return '<span class="tag">收到</span>'; const text = m.statusText || "发送中"; const cls = m.status === "failed" ? " fail" : (m.status === "sending" ? " wait" : ""); return '<span class="tag' + cls + '">' + esc(text) + "</span>"; }
    function metric(title, value, sub, p, mode) { return '<article class="metric"><h3>' + esc(title) + '</h3><strong>' + esc(value) + '</strong><small title="' + esc(sub) + '">' + esc(sub) + '</small><div class="bar"><div class="fill ' + fillClass(Number(p || 0), mode) + '" style="width:' + Math.max(0, Math.min(100, Number(p || 0))) + '%"></div></div></article>'; }
    function chip(k, v) { return '<span class="chip" title="' + esc(k + " " + (v || "未知")) + '"><b>' + esc(k) + '</b>' + esc(v || "未知") + "</span>"; }
    function renderStatusMeta() {
      els.nowText.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      els.pageUpdateText.textContent = shortTime(state.lastPageUpdateAt);
      els.deviceUpdateText.textContent = shortTime(state.lastDeviceSampleAt);
      const latest = state.messages.reduce((max, m) => Math.max(max, Number(m.receivedAt || 0)), 0);
      els.latestMessageText.textContent = latest ? timeText(latest) : "暂无";
    }

    function renderDevice(d) {
      if (!d) { els.board.innerHTML = ""; els.alerts.innerHTML = ""; return; }
      const b = d.battery || {}, mem = d.memory || {}, st = d.storage || {}, dev = d.device || {}, net = d.network || {}, svc = d.services || {}, sms = d.sms || {};
      state.lastDeviceSampleAt = Number(d.sampledAt || 0);
      renderStatusMeta();
      const sim = (sms.sims || []).map(s => "卡" + (Number(s.slotIndex) + 1) + " " + (s.carrierName || s.displayName || "SIM")).join("；") || "未读取";
      els.board.innerHTML =
        metric("电量", b.level == null ? "未知" : b.level + "%", (b.charging ? "充电" : "未充电") + (b.temperatureC != null ? " · " + b.temperatureC + "°C" : ""), b.level || 0, "battery") +
        metric("内存", mem.usedPercent + "%", bytes(mem.usedBytes) + " / " + bytes(mem.totalBytes), mem.usedPercent) +
        metric("存储", st.usedPercent + "%", bytes(st.usedBytes) + " / " + bytes(st.totalBytes), st.usedPercent) +
        metric("短信", String(sms.storedMessages || 0), "本机记录", Math.min(100, (Number(sms.storedMessages || 0) / 500) * 100)) +
        '<article class="metric facts"><div class="compactFacts">' +
        chip("设备", [(dev.manufacturer || ""), dev.model].filter(Boolean).join(" ")) + chip("系统", "Android " + (dev.android || "")) +
        chip("运行", uptime(dev.uptimeMs)) + chip("网络", (net.connected ? "已连 " : "未连 ") + (net.type || "")) +
        chip("桥", svc.sendBridge ? "已连接" : (svc.requiresSendBridge ? "未启动" : "不需要")) + chip("SIM", sim) + "</div></article>";
      const alerts = [];
      if (b.level != null && b.level <= 20) alerts.push(["bad", "电量偏低"]);
      if (Number(st.usedPercent || 0) >= 90) alerts.push(["bad", "存储将满"]);
      if (Number(mem.usedPercent || 0) >= 90) alerts.push(["warn", "内存压力高"]);
      if (!net.connected) alerts.push(["bad", "网络未连接"]);
      if (svc.requiresSendBridge && !svc.sendBridge) alerts.push(["bad", "发送桥未启动"]);
      if (!alerts.length) alerts.push(["ok", "设备状态正常"]);
      els.alerts.innerHTML = alerts.map(a => '<span class="pill ' + a[0] + '">' + esc(a[1]) + "</span>").join("");
    }

    function renderQuickCode() {
      const found = state.messages.find(m => codeOf(m));
      if (!found) { els.quick.classList.remove("show"); els.quick.innerHTML = ""; return; }
      const code = codeOf(found), who = found.direction === "outgoing" ? found.recipient : found.sender;
      els.quick.classList.add("show");
      els.quick.innerHTML = '<div><div class="sub">最近验证码</div><div class="codeValue">' + esc(code) + '</div><div class="sub">' + esc(displayName(who || "未知号码")) + " · " + esc(new Date(found.receivedAt).toLocaleString()) + '</div></div><button class="primary" data-copy="' + esc(code) + '">复制验证码</button>';
    }

    function render() {
      renderQuickCode();
      if (!state.messages.length) { els.list.innerHTML = '<article class="message empty">没有匹配的短信</article>'; return; }
      els.list.innerHTML = state.messages.map(m => {
        const outgoing = m.direction === "outgoing";
        const number = outgoing ? (m.recipient || m.sender || "未知号码") : (m.sender || "未知号码");
        const code = codeOf(m);
        const sim = m.simSlot != null ? "卡槽 " + (Number(m.simSlot) + 1) : esc(m.deviceId || "");
        const retry = outgoing && (m.status === "failed" || m.status === "submitted") ? '<button data-retry="' + esc(m.id) + '">重试</button>' : "";
        return '<article class="message"><div class="meta">' + statusTag(m) +
          '<span class="sender">' + esc(outgoing ? "发给 " + displayName(number) : displayName(number)) + '</span><span>' + esc(new Date(m.receivedAt).toLocaleString()) +
          '</span><span>' + sim + '</span>' + (code ? '<button class="copyCode" data-copy="' + esc(code) + '">验证码 ' + esc(code) + '</button>' : '') +
          '</div><div class="body">' + esc(m.body || "") + '</div><div class="messageActions">' +
          '<button data-copy="' + esc(m.body || "") + '">复制全文</button><button data-remark="' + esc(number) + '">备注</button>' + retry + '</div></article>';
      }).join("");
    }

    function renderSims() {
      els.simSelect.innerHTML = state.sims.length ? state.sims.map(s => '<option value="' + s.subscriptionId + '">卡槽 ' + (s.slotIndex + 1) + ' · ' + esc(s.displayName || s.carrierName || "SIM") + (s.isDefault ? " · 默认" : "") + "</option>").join("") : '<option value="-1">默认短信 SIM</option>';
      const selected = selectedRadio("simFilter", "all");
      els.simFilter.innerHTML = '<label><input type="radio" name="simFilter" value="all"' + (selected === "all" ? " checked" : "") + '><span>全部 SIM</span></label>' +
        state.sims.map(s => {
          const value = String(s.slotIndex);
          return '<label><input type="radio" name="simFilter" value="' + value + '"' + (selected === value ? " checked" : "") + '><span>卡槽 ' + (s.slotIndex + 1) + ' · ' + esc(s.displayName || s.carrierName || "SIM") + '</span></label>';
        }).join("");
    }
    function renderPager() { const page = Math.floor(state.offset / state.pageSize) + 1, pages = Math.max(Math.ceil(state.total / state.pageSize), 1); els.pageInfo.textContent = "第 " + page + " / " + pages + " 页 · 共 " + state.total + " 条"; els.prev.disabled = state.offset <= 0; els.next.disabled = state.offset + state.pageSize >= state.total; }
    function queryString(limit, offset) {
      const p = new URLSearchParams({
        limit: String(limit),
        offset: String(offset),
        q: els.search.value.trim(),
        direction: selectedRadio("directionFilter", "all"),
        sim: selectedRadio("simFilter", "all")
      });
      const startAt = dateStart(els.smsStartDate.value), endAt = dateEnd(els.smsEndDate.value);
      if (selectedRadio("codeFilter", "all") === "code") p.set("codeOnly", "1");
      if (startAt) p.set("startAt", String(startAt));
      if (endAt) p.set("endAt", String(endAt));
      return p.toString();
    }
    async function loadDevice() { const r = await apiFetch("/api/device", { headers: headers() }, 3); if (!r.ok) throw new Error(r.status === 401 ? "密码错误或未登录" : "读取设备状态失败 HTTP " + r.status); renderDevice(await r.json()); }
    async function loadSims() { const r = await apiFetch("/api/sims", { headers: headers() }, 3); if (!r.ok) throw new Error(r.status === 401 ? "密码错误或未登录" : "读取 SIM 失败 HTTP " + r.status); const d = await r.json(); state.sims = d.sims || []; renderSims(); }
    async function load() {
      if (!els.token.value) { els.status.textContent = "未登录"; els.hint.textContent = "请在设置里填写访问密码"; els.statusBox.classList.remove("ok"); renderDevice(null); openModal(els.modal); return; }
      els.status.textContent = "正在读取"; els.hint.textContent = "正在连接坚果手机";
      const [msg] = await Promise.all([apiFetch("/api/messages?" + queryString(state.pageSize, state.offset), { headers: headers() }, 3), loadDevice().catch(() => {})]);
      if (!msg.ok) throw new Error(msg.status === 401 ? "密码错误或未登录" : "读取失败 HTTP " + msg.status);
      const d = await msg.json(); state.messages = d.messages || []; state.total = d.total || 0; state.lastPageUpdateAt = Date.now(); render(); renderPager(); renderStatusMeta(); els.statusBox.classList.add("ok"); els.status.textContent = "连接正常"; els.hint.textContent = "当前页 " + state.messages.length + " 条短信 · 状态已更新";
    }
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); toast("已复制"); }
      catch (_) { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); t.remove(); toast("已复制"); }
    }
    async function exportData(type) {
      const r = await apiFetch("/api/messages?" + queryString(500, 0), { headers: headers() }, 3);
      if (!r.ok) { toast("导出失败"); return; }
      const data = await r.json(), rows = data.messages || [];
      let content, name, mime;
      if (type === "json") { content = JSON.stringify(rows, null, 2); name = "remote-sms.json"; mime = "application/json"; }
      else {
        const head = ["time","direction","sender","recipient","simSlot","status","code","body"];
        const csv = [head.join(",")].concat(rows.map(m => head.map(k => '"' + String(k === "time" ? new Date(m.receivedAt).toISOString() : (k === "code" ? codeOf(m) : (m[k] || ""))).replaceAll('"', '""') + '"').join(",")));
        content = csv.join("\n"); name = "remote-sms.csv"; mime = "text/csv";
      }
      const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([content], { type: mime + ";charset=utf-8" })); a.download = name; a.click(); URL.revokeObjectURL(a.href);
    }
    function openSend(prefill) {
      if (!els.token.value) { openModal(els.modal); return; }
      openModal(els.sendModal); loadSims().catch(e => toast(e.message));
      if (prefill) {
        const phone = splitPhone(prefill.recipient || "");
        els.countryCode.value = phone.countryCode;
        els.localNumber.value = phone.localNumber;
        els.smsBody.value = prefill.body || "";
        if (prefill.subscriptionId != null) els.simSelect.value = String(prefill.subscriptionId);
      }
      setTimeout(() => els.localNumber.focus(), 30);
    }
    function debounce(fn, ms) { let id; return () => { clearTimeout(id); id = setTimeout(fn, ms); }; }
    function showMainView() { els.logsView.classList.add("hidden"); els.mainView.classList.remove("hidden"); }
    function showLogsView() { els.mainView.classList.add("hidden"); els.logsView.classList.remove("hidden"); loadLogs(); }
    function handleLoadError(e) {
      els.status.textContent = "连接中断";
      els.hint.textContent = "网络或 frp 可能抖动，稍后自动重试：" + e.message;
      els.statusBox.classList.remove("ok");
      toast(e.message);
    }
    function isIssueLog(entry) {
      const text = (entry.type + " " + entry.detail + " " + entry.line).toLowerCase();
      return /失败|异常|不可用|未启动|停止|error|fail|exception|timeout|denied|refused|unavailable|bad|warn/.test(text);
    }
    function logTypeClass(entry) {
      if (isIssueLog(entry)) return "bad";
      if (/watchdog|frp|bridge|send/.test(String(entry.type || ""))) return "warn";
      return "";
    }
    function filteredLogs() {
      const q = els.logSearch.value.trim().toLowerCase();
      const type = selectedRadio("logTypeFilter", "all");
      const issue = selectedRadio("logIssueFilter", "all");
      const start = els.logStartDate.value;
      const end = els.logEndDate.value;
      return state.logs.filter(entry => {
        const text = (entry.time + " " + entry.type + " " + entry.detail + " " + entry.line).toLowerCase();
        const matchesText = !q || text.includes(q);
        const matchesType = type === "all" || entry.type === type;
        const isIssue = isIssueLog(entry);
        const matchesIssue = issue === "all" || (issue === "issue" && isIssue) || (issue === "normal" && !isIssue);
        const day = String(entry.time || "").slice(0, 10);
        const matchesStart = !start || day >= start;
        const matchesEnd = !end || day <= end;
        return matchesText && matchesType && matchesIssue && matchesStart && matchesEnd;
      }).slice().reverse();
    }
    function renderLogTypes() {
      const selected = selectedRadio("logTypeFilter", "all");
      els.logTypeFilter.innerHTML = '<label><input type="radio" name="logTypeFilter" value="all"' + (selected === "all" ? " checked" : "") + '><span>全部类型</span></label>' +
        state.logTypes.map(type => '<label><input type="radio" name="logTypeFilter" value="' + esc(type) + '"' + (selected === type ? " checked" : "") + '><span>' + esc(type) + '</span></label>').join("");
    }
    function renderLogStats(sampledAt) {
      const issues = state.logs.filter(isIssueLog).length;
      const frp = state.logs.filter(entry => entry.type === "frp" || String(entry.detail || "").toLowerCase().includes("frp")).length;
      els.logTotal.textContent = String(state.logs.length);
      els.logIssues.textContent = String(issues);
      els.logFrp.textContent = String(frp);
      els.logUpdated.textContent = sampledAt ? shortTime(sampledAt) : "未读取";
    }
    function renderLogs() {
      const logs = filteredLogs();
      els.logSummary.textContent = "当前显示 " + logs.length + " 条 · 原始日志 " + state.logs.length + " 条";
      if (!logs.length) {
        els.logsList.innerHTML = '<article class="logRow"><div class="logDetail">没有匹配的日志</div></article>';
        return;
      }
      els.logsList.innerHTML = logs.map(entry => '<article class="logRow">' +
        '<div class="logTime">' + esc(entry.time || "未知时间") + '</div>' +
        '<div class="logType ' + logTypeClass(entry) + '">' + esc(entry.type || "event") + '</div>' +
        '<div class="logDetail">' + esc(entry.detail || entry.line || "") + '</div>' +
        '</article>').join("");
    }
    async function loadLogs() {
      els.logsList.innerHTML = '<article class="logRow"><div class="logDetail">正在读取日志...</div></article>';
      try {
        const r = await apiFetch("/api/logs", { headers: headers() }, 3);
        if (!r.ok) throw new Error(r.status === 401 ? "密码错误或未登录" : "HTTP " + r.status);
        const d = await r.json();
        state.logs = d.entries || [];
        state.rawLogs = d.logs || "";
        state.logTypes = d.types || [];
        renderLogTypes();
        renderLogStats(d.sampledAt);
        renderLogs();
      } catch (e) {
        els.logsList.innerHTML = '<article class="logRow"><div class="logDetail">读取日志失败：' + esc(e.message) + '</div></article>';
      }
    }

    document.querySelector("#settings").onclick = () => openModal(els.modal);
    document.querySelector("#close").onclick = () => closeModal(els.modal);
    els.modal.onclick = e => { if (e.target === els.modal) closeModal(els.modal); };
    document.querySelector("#save").onclick = () => { localStorage.setItem("smsToken", els.token.value); closeModal(els.modal); state.offset = 0; load().catch(handleLoadError); };
    document.querySelector("#updateToken").onclick = async () => {
      const r = await fetch("/api/config", { method: "POST", headers: { ...headers(), "Content-Type": "application/json" }, body: JSON.stringify({ token: els.newToken.value }) });
      if (!r.ok) { els.status.textContent = r.status === 401 ? "当前密码错误，无法修改" : "更新失败 HTTP " + r.status; return; }
      els.token.value = els.newToken.value; localStorage.setItem("smsToken", els.token.value); els.newToken.value = ""; closeModal(els.modal); toast("访问密码已更新"); load().catch(e => toast(e.message));
    };
    document.querySelector("#logsOpen").onclick = showLogsView;
    document.querySelector("#logsBack").onclick = showMainView;
    document.querySelector("#logsRefresh").onclick = loadLogs;
    document.querySelector("#logsCopy").onclick = () => copyText(filteredLogs().map(entry => entry.line || [entry.time, entry.type, entry.detail].join("  ")).join("\n"));
    document.querySelector("#logsCopyRaw").onclick = () => copyText(state.rawLogs || "");
    document.querySelector("#logsClearFilters").onclick = () => {
      els.logSearch.value = ""; els.logStartDate.value = ""; els.logEndDate.value = "";
      const type = document.querySelector('input[name="logTypeFilter"][value="all"]'); if (type) type.checked = true;
      const issue = document.querySelector('input[name="logIssueFilter"][value="all"]'); if (issue) issue.checked = true;
      renderLogs();
    };
    const logFilterChanged = debounce(renderLogs, 180);
    els.logSearch.oninput = logFilterChanged;
    els.logTypeFilter.onchange = renderLogs;
    els.logIssueFilter.onchange = renderLogs;
    els.logStartDate.onchange = renderLogs;
    els.logEndDate.onchange = renderLogs;
    document.querySelectorAll("[data-log-range]").forEach(button => {
      button.onclick = () => { setDateRange(els.logStartDate, els.logEndDate, button.getAttribute("data-log-range")); renderLogs(); };
    });
    document.querySelector("#sendOpen").onclick = () => openSend();
    document.querySelector("#sendClose").onclick = () => closeModal(els.sendModal);
    els.sendModal.onclick = e => { if (e.target === els.sendModal) closeModal(els.sendModal); };
    document.querySelector("#sendSms").onclick = async () => {
      const payload = { subscriptionId: Number(els.simSelect.value || -1), countryCode: els.countryCode.value, localNumber: els.localNumber.value, recipient: composedRecipient(), body: els.smsBody.value };
      const r = await fetch("/api/send", { method: "POST", headers: { ...headers(), "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) { els.status.textContent = d.error || "发送失败 HTTP " + r.status; els.hint.textContent = "请检查号码、内容和发送权限"; return; }
      closeModal(els.sendModal); els.localNumber.value = ""; els.smsBody.value = ""; state.offset = 0; toast("短信已提交发送"); await load(); setTimeout(() => load().catch(() => {}), 2500); setTimeout(() => load().catch(() => {}), 8000);
    };
    els.list.onclick = e => {
      const copy = e.target.getAttribute("data-copy"); if (copy != null) return copyText(copy);
      const remark = e.target.getAttribute("data-remark"); if (remark) { state.remarkNumber = remark; els.remarkTarget.textContent = "为 " + remark + " 设置备注"; els.remarkName.value = remarks()[remark] || ""; openModal(els.remarkModal); return; }
      const retry = e.target.getAttribute("data-retry"); if (retry) { const m = state.messages.find(x => x.id === retry); if (m) openSend({ recipient: m.recipient || m.sender, body: m.body, subscriptionId: m.subscriptionId }); }
    };
    els.quick.onclick = e => { const copy = e.target.getAttribute("data-copy"); if (copy != null) copyText(copy); };
    document.querySelector("#remarkCancel").onclick = () => closeModal(els.remarkModal);
    document.querySelector("#remarkSave").onclick = () => { setRemark(state.remarkNumber, els.remarkName.value.trim()); closeModal(els.remarkModal); render(); toast("备注已保存"); };
    document.querySelector("#refresh").onclick = () => load().catch(handleLoadError);
    els.prev.onclick = () => { state.offset = Math.max(0, state.offset - state.pageSize); load().catch(handleLoadError); };
    els.next.onclick = () => { if (state.offset + state.pageSize < state.total) { state.offset += state.pageSize; load().catch(handleLoadError); } };
    const filterChanged = debounce(() => { state.offset = 0; load().catch(handleLoadError); }, 260);
    els.search.oninput = filterChanged;
    els.direction.onchange = filterChanged;
    els.simFilter.onchange = filterChanged;
    els.codeFilter.onchange = filterChanged;
    els.smsStartDate.onchange = filterChanged;
    els.smsEndDate.onchange = filterChanged;
    document.querySelectorAll("[data-sms-range]").forEach(button => {
      button.onclick = () => { setDateRange(els.smsStartDate, els.smsEndDate, button.getAttribute("data-sms-range")); state.offset = 0; load().catch(handleLoadError); };
    });
    document.querySelector("#clearFilters").onclick = () => {
      els.search.value = ""; els.smsStartDate.value = ""; els.smsEndDate.value = "";
      document.querySelector('input[name="directionFilter"][value="all"]').checked = true;
      const simAll = document.querySelector('input[name="simFilter"][value="all"]'); if (simAll) simAll.checked = true;
      document.querySelector('input[name="codeFilter"][value="all"]').checked = true;
      state.offset = 0; load().catch(handleLoadError);
    };
    document.querySelector("#exportCsv").onclick = () => exportData("csv");
    document.querySelector("#exportJson").onclick = () => exportData("json");
    loadSims().catch(() => {});
    setInterval(() => {
      if (!document.hidden && !els.mainView.classList.contains("hidden") && !els.modal.classList.contains("open") && !els.sendModal.classList.contains("open") && !els.remarkModal.classList.contains("open")) {
        load().catch(handleLoadError);
      }
    }, 120000);
    window.addEventListener("online", () => load().catch(handleLoadError));
    renderStatusMeta();
    setInterval(renderStatusMeta, 1000);
    load().catch(handleLoadError);
  </script>
</body>
</html>
