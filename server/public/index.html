<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote SMS</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --text: #202124;
        --muted: #6b6f76;
        --line: #d9d9d4;
        --accent: #176b87;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151719;
          --panel: #202326;
          --text: #f0f2f3;
          --muted: #a6adb4;
          --line: #34383d;
          --accent: #60b6d0;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        margin-bottom: 16px;
      }
      input, button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
      }
      input {
        padding: 0 12px;
      }
      button {
        padding: 0 14px;
        cursor: pointer;
      }
      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
      }
      .list {
        display: grid;
        gap: 10px;
      }
      .message {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .sender {
        color: var(--text);
        font-weight: 650;
      }
      .body {
        white-space: pre-wrap;
        word-break: break-word;
      }
      @media (max-width: 640px) {
        header { align-items: flex-start; flex-direction: column; }
        main { padding: 14px; }
        .toolbar { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Remote SMS</h1>
      <div class="status" id="status">未连接</div>
    </header>
    <main>
      <div class="toolbar">
        <input id="token" type="password" placeholder="访问 token" autocomplete="current-password" />
        <button id="save">保存</button>
        <button class="primary" id="refresh">刷新</button>
      </div>
      <section class="list" id="messages"></section>
    </main>
    <script>
      const tokenInput = document.querySelector("#token");
      const statusEl = document.querySelector("#status");
      const listEl = document.querySelector("#messages");
      let messages = [];
      let events;

      tokenInput.value = localStorage.getItem("smsToken") || "";

      function authHeaders() {
        return tokenInput.value ? { Authorization: `Bearer ${tokenInput.value}` } : {};
      }

      function render() {
        listEl.innerHTML = messages.map(message => {
          const when = new Date(message.receivedAt).toLocaleString();
          return `
            <article class="message">
              <div class="meta">
                <span class="sender">${escapeHtml(message.sender || "未知号码")}</span>
                <span>${escapeHtml(when)}</span>
                <span>${escapeHtml(message.deviceId || "")}</span>
              </div>
              <div class="body">${escapeHtml(message.body || "")}</div>
            </article>
          `;
        }).join("");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function loadMessages() {
        statusEl.textContent = "读取中";
        const response = await fetch("/api/messages", { headers: authHeaders() });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        messages = data.messages || [];
        render();
        statusEl.textContent = `已读取 ${messages.length} 条`;
      }

      function connectEvents() {
        if (events) events.close();
        const query = tokenInput.value ? `?token=${encodeURIComponent(tokenInput.value)}` : "";
        events = new EventSource(`/events${query}`);
        events.onopen = () => { statusEl.textContent = "实时连接中"; };
        events.onmessage = event => {
          const message = JSON.parse(event.data);
          messages = [message, ...messages.filter(item => item.id !== message.id)].slice(0, 200);
          render();
        };
        events.onerror = () => { statusEl.textContent = "实时连接断开"; };
      }

      document.querySelector("#save").addEventListener("click", () => {
        localStorage.setItem("smsToken", tokenInput.value);
        connectEvents();
        loadMessages().catch(error => { statusEl.textContent = error.message; });
      });
      document.querySelector("#refresh").addEventListener("click", () => {
        loadMessages().catch(error => { statusEl.textContent = error.message; });
      });

      loadMessages().catch(error => { statusEl.textContent = error.message; });
      connectEvents();
    </script>
  </body>
</html>
